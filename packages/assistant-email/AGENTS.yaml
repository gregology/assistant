context:
  - match: ["**/*.py"]
    on: [edit, create]
    when: before
    content: |
      Integration code imports from assistant_sdk.*, never from app.*.
      The import-linter config in pyproject.toml enforces this boundary.
      Run `uv run lint-imports` to verify after changes.

  - match: ["**/manifest.yaml"]
    on: [edit, create]
    when: before
    content: |
      manifest.yaml required fields: domain (must match package name), name, version.
      Optional: entry_task, dependencies, config_schema (JSON Schema), platforms
      (each with name, entry_task, config_schema), services (each with name,
      handler, input_schema, and optionally reversible, human_log, description).
      Services are irreversible by default. Only set reversible: true for services
      that are both read-only AND do not transmit data beyond the system boundary.

  - match: ["**/const.py"]
    on: [edit, create]
    when: before
    content: |
      const.py must export DETERMINISTIC_SOURCES (frozenset of condition keys from
      deterministic sources) and IRREVERSIBLE_ACTIONS (frozenset of actions that
      cannot be undone). If const.py is missing or fails to load, all actions are
      treated as irreversible (fail-safe default). Even if your platform has only
      reversible actions, you need IRREVERSIBLE_ACTIONS = frozenset() to avoid
      false blocks.

  - match: ["**/templates/*.jinja"]
    on: [edit, create]
    when: after
    content: |
      Prompt injection defense is dual-barrier:
      1. Random salt markers (secrets.token_hex(4).upper()) wrap untrusted content
      2. Template includes "Ignore all previous instructions" after untrusted block
      3. Deterministic dispatch layer prevents unsafe actions even if prompt barrier fails
      Follow the existing classify.jinja templates as reference. Never remove or weaken
      either barrier. The salt pattern is not optional.
