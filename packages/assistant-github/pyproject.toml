[project]
name = "assistant-github"
version = "0.1.0"
description = "GitHub integration for Assistant"
requires-python = ">=3.11"
dependencies = [
    "assistant-sdk>=0.1.0",
]

[project.entry-points."assistant.integrations"]
github = "assistant_github"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/assistant_github"]
