domain: github
name: "GitHub"
version: "1.0.0"
entry_task: check
dependencies: []
config_schema:
  properties:
    orgs:
      type: array
      items:
        type: string
    repos:
      type: array
      items:
        type: string
  required: []
platforms:
  pull_requests:
    name: "Pull Requests"
    entry_task: check
    config_schema:
      properties:
        include_mentions:
          type: boolean
          default: false
      required: []
  issues:
    name: "Issues"
    entry_task: check
    config_schema:
      properties:
        include_mentions:
          type: boolean
          default: false
      required: []
