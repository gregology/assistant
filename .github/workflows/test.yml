name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - run: uv run pytest -v

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: mypy
        run: uv run mypy app/ packages/ --ignore-missing-imports

      - name: ruff
        run: uv run ruff check app/ packages/ tests/

      - name: bandit
        run: uv run bandit -r app/ -q

      - name: vulture
        run: uv run vulture app/ packages/ --min-confidence 80

      - name: complexipy
        run: uv run complexipy app/ packages/ --max-complexity-allowed 15

      - name: radon
        run: uv run radon cc app/ -a -nc
