[project]
name = "assistant-gemini"
version = "0.1.0"
description = "Google Gemini integration for Assistant"
requires-python = ">=3.11"
dependencies = [
    "assistant-sdk>=0.1.0",
    "google-genai>=1.0",
]

[project.entry-points."assistant.integrations"]
gemini = "assistant_gemini"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/assistant_gemini"]
