[project]
name = "assistant-email"
version = "0.1.0"
description = "Email (IMAP) integration for Assistant"
requires-python = ">=3.11"
dependencies = [
    "assistant-sdk>=0.1.0",
    "imap-tools>=1.7",
    "beautifulsoup4>=4.12",
    "icalendar>=7.0.1",
    "tldextract>=5.0",
]

[project.entry-points."assistant.integrations"]
email = "assistant_email"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/assistant_email"]
