domain: github
name: "GitHub"
version: "1.0.0"
entry_task: check
dependencies: []
setup_hook: ".setup.setup"
config_schema:
  properties:
    github_user:
      type: string
    app_id:
      type: string
    installation_id:
      type: string
    private_key:
      type: string
    orgs:
      type: array
      items:
        type: string
    repos:
      type: array
      items:
        type: string
  required:
    - github_user
    - app_id
    - installation_id
    - private_key
platforms:
  pull_requests:
    name: "Pull Requests"
    entry_task: check
    handlers:
      check: ".platforms.pull_requests.check.handle"
      collect: ".platforms.pull_requests.collect.handle"
      classify: ".platforms.pull_requests.classify.handle"
      evaluate: ".platforms.pull_requests.evaluate.handle"
      act: ".platforms.pull_requests.act.handle"
    config_schema:
      properties:
        include_mentions:
          type: boolean
          default: false
      required: []
  issues:
    name: "Issues"
    entry_task: check
    handlers:
      check: ".platforms.issues.check.handle"
      collect: ".platforms.issues.collect.handle"
      classify: ".platforms.issues.classify.handle"
      evaluate: ".platforms.issues.evaluate.handle"
      act: ".platforms.issues.act.handle"
    config_schema:
      properties:
        include_mentions:
          type: boolean
          default: false
      required: []
services:
  create_issue:
    name: "Create Issue"
    description: "Create an issue in a GitHub repository"
    handler: ".services.create_issue.handle"
    reversible: false
    input_schema:
      properties:
        repo: { type: string, description: "Repository in org/repo format" }
        title: { type: string, description: "Issue title" }
        body: { type: string, description: "Issue body" }
      required: [repo, title]
    chat:
      description: "Create a GitHub issue"
      options:
        - id: approve
          label: "Post issue"
        - id: reject
          label: "Cancel"
