domain: email
name: "Email (IMAP)"
version: "1.0.0"
entry_task: check
dependencies: []
config_schema:
  properties:
    imap_server:
      type: string
    imap_port:
      type: integer
      default: 993
    username:
      type: string
    password:
      type: string
  required:
    - imap_server
    - username
    - password

handlers:
  draft_reply: ".actions.draft_reply"

platforms:
  inbox:
    name: "Inbox"
    entry_task: check
    handlers:
      check: ".platforms.inbox.check.handle"
      collect: ".platforms.inbox.collect.handle"
      classify: ".platforms.inbox.classify.handle"
      evaluate: ".platforms.inbox.evaluate.handle"
      act: ".platforms.inbox.act.handle"
    config_schema:
      properties:
        limit:
          type: integer
          default: 50
      required: []
