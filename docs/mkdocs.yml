site_name: Assistant

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Why: why.md
  - Design: design.md
  - Architecture:
      - Overview: architecture/overview.md
      - Safety Model: architecture/safety-model.md
      - Human Log: architecture/human-log.md
      - Web UI: architecture/web-ui.md
  - API: api.md
  - Development: development.md
  - Testing:
      - Guide: testing/guide.md
      - Philosophy: testing/philosophy.md
  - Code Quality Tools: code-quality-tools.md

docs_dir: .
site_dir: ../site
