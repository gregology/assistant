llm:
  base_url: http://localhost:11434
  fast_model: your-model-name:latest

email:
  imap_server: imap.example.com
  imap_port: 993
  username: you@example.com
  password: your-app-password

queue:
  data_dir: queue

schedules:
  - task: check_email
    every: 30m
    options:
      limit: 50
  - task: update_github_prs
    every: 30m
  # Advanced: use raw cron expressions
  # - type: check_email
  #   cron: "0 3 * * *"
  #   options:
  #     limit: 500

storage:
  notes_dir: /path/to/notes
