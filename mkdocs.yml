site_name: Assistant
site_url: https://assistant.gho.st
site_description: A safe, transparent AI assistant with human oversight.
docs_dir: .
site_dir: ../site
repo_url: https://github.com/gregology/assistant
repo_name: gregology/assistant
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - tables
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Why: why.md
  - Design: design.md
  - Architecture:
      - Overview: architecture/overview.md
      - Safety Model: architecture/safety-model.md
      - Human Log: architecture/human-log.md
      - Web UI: architecture/web-ui.md
  - API: api.md
  - Development: development.md
  - Testing:
      - Guide: testing/guide.md
      - Philosophy: testing/philosophy.md
  - Code Quality Tools: code-quality-tools.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/gregology/assistant
